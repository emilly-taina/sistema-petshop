<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre Patas | Agendamentos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/agendamentos.css">
</head>

<body>

<header class="site-header">

    <div class="brand">

        <div class="brand-mark">EP</div>

        <span>Entre Patas</span>

    </div>

    <a class="voltar" href="dashboard.html">← Dashboard</a>

</header>

<main>

<section class="titulo">

<h1>Gerenciamento de Agendamentos</h1>

<p>Cadastre e acompanhe os serviços agendados.</p>

</section>

<section class="card">

<form id="formAgendamento">

<input type="text" id="tutor" placeholder="Nome do Tutor" required>

<input type="text" id="pet" placeholder="Nome do Pet" required>

<select id="servico" required>

<option value="">Serviço</option>

<option>Banho</option>

<option>Tosa</option>

<option>Banho e Tosa</option>

<option>Consulta</option>

<option>Vacinação</option>

</select>

<input type="date" id="data" required>

<input type="time" id="hora" required>

<input type="tel" id="telefone" placeholder="Telefone" required>

<button type="submit">

Salvar Agendamento

</button>

</form>

</section>

<section class="card">

<table>

<thead>

<tr>

<th>Tutor</th>

<th>Pet</th>

<th>Serviço</th>

<th>Data</th>

<th>Hora</th>

<th>Status</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="tabelaAgendamentos">

</tbody>

</table>

</section>

</main>

<script src="js/agendamentos.js"></script>

</body>
</html>
