<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento</title>
  <link rel="stylesheet" href="css/agendamento.css">
</head>
<body>

    <!-- Patronizar o cabeçalho -->
  <header class="cabecalho">
    <div class="logo"> Pet Shop </div>
    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="servicos.html">Serviços</a>
      <a href="produtos.html">Produtos</a>
      <a href="agendamento.html" class="ativo">Agendamento</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <main class="conteudo">
    <h1>Agende um serviço</h1>
    <p>Preencha o formulário abaixo para agendar um horário.</p>

    <form class="formulario" id="formAgendamento">
      <label for="tutor">Nome do tutor</label>
      <input type="text" id="tutor" required>

      <label for="pet">Nome do pet</label>
      <input type="text" id="pet" required>

      <label for="servico">Tipo de serviço</label>
      <select id="servico" required>
        <option value="">Selecione o serviço desejado</option>
        <option value="Banho">Banho</option>
        <option value="Tosa">Tosa</option>
        <option value="Consulta veterinária">Consulta veterinária</option>
        <option value="Vacinação">Vacinação</option>
      </select>

      <label for="data">Data</label>
      <input type="date" id="data" required>

      <label for="horario">Horário</label>
      <input type="time" id="horario" required>

      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" required>

      <h2 class="subtitulo">Localização</h2>

      <label for="cep">CEP</label>
      <input type="text" id="cep">
      <button type="button" class="botao botao-cep" onclick="buscarCep()">Buscar endereço</button>

      <label for="rua">Rua</label>
      <input type="text" id="rua">

      <label for="numero">Número</label>
      <input type="text" id="numero">

      <label for="bairro">Bairro</label>
      <input type="text" id="bairro">

      <label for="cidade">Cidade</label>
      <input type="text" id="cidade">

      <label for="estado">Estado</label>
      <input type="text" id="estado">

      <button type="submit" class="botao">Confirmar agendamento</button>
    </form>

    <p id="mensagem" class="mensagem"></p>
  </main>

  <!-- Patronizar o rodape -->
  <footer class="rodape">

  </footer>

  <script src="js/agendamento.js"></script>
</body>
</html>
